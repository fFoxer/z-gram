version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zgram_postgres
    environment:
      POSTGRES_USER: zgram_user
      POSTGRES_PASSWORD: zgram_password123
      POSTGRES_DB: zgram_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zgram_network

  redis:
    image: redis:7-alpine
    container_name: zgram_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zgram_network

volumes:
  postgres_data:
  redis_data:

networks:
  zgram_network:
    driver: bridge

