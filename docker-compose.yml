version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zgram_postgres
    environment:
      POSTGRES_USER: zgram_user
      POSTGRES_PASSWORD: zgram_password123
      POSTGRES_DB: zgram_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./zgram_dump.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - zgram_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zgram_user -d zgram_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zgram_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zgram_network

  server:
    build: ./server
    container_name: zgram_server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      HTTPS: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: zgram_user
      DB_PASSWORD: zgram_password123
      DB_NAME: zgram_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change_this_secret_in_production
      JWT_REFRESH_SECRET: change_this_refresh_secret_in_production
      JWT_ACCESS_EXPIRE: 15m
      JWT_REFRESH_EXPIRE: 7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    networks:
      - zgram_network
    restart: unless-stopped

  client:
    build: ./client
    container_name: zgram_client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - zgram_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  zgram_network:
    driver: bridge
